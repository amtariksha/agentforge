# Run this on the APP VPS only (when using a separate DB server)
# Usage: docker compose -f docker-compose.app.yml up -d

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      # DATABASE_URL points to the REMOTE DB server — set in .env
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redisdata:
